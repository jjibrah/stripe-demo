<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
    }

    body {
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      width: 360px;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      animation: fadeIn 0.5s ease;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      color: #6e6e73;
      display: block;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d2d2d7;
      font-size: 15px;
      transition: 0.2s;
      outline: none;
    }

    select:focus, input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
    }

    .summary {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #f9f9fb;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #0071e3;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #005bb5;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .loader {
      display: none;
      margin: 12px auto 0;
      width: 24px;
      height: 24px;
      border: 3px solid #ddd;
      border-top: 3px solid #0071e3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Secure Checkout</h1>

    <div class="field">
      <label>Currency</label>
      <select id="currency">
        <option value="usd">USD</option>
        <option value="eur">EUR</option>
        <option value="jpy">JPY</option>
        <option value="kes">KES</option>
      </select>
    </div>

    <div class="field">
      <label>Amount</label>
      <input type="number" id="price" value="1" min="1" step="0.01">
    </div>

    <div class="summary">
      <span>Total</span>
      <span id="total">$1.00</span>
    </div>

    <button class="btn" id="checkout">Pay</button>
    <div class="loader" id="loader"></div>
  </div>

  <script>
    const priceEl = document.getElementById("price");
    const currencyEl = document.getElementById("currency");
    const totalEl = document.getElementById("total");

    function updateTotal() {
      const price = parseFloat(priceEl.value || 0).toFixed(2);
      const currency = currencyEl.value.toUpperCase();
      totalEl.innerText = `${currency} ${price}`;
    }

    priceEl.addEventListener("input", updateTotal);
    currencyEl.addEventListener("change", updateTotal);

    document.getElementById("checkout").onclick = async () => {
      const loader = document.getElementById("loader");
      loader.style.display = "block";

      const price = priceEl.value;
      const currency = currencyEl.value;

      const res = await fetch("/create-checkout-session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ price, currency }),
      });

      const data = await res.json();

      if (data.url) {
        window.location.href = data.url;
      } else {
        alert(data.error || "Something went wrong");
        loader.style.display = "none";
      }
    };

    updateTotal();
  </script>
</body>
</html>
