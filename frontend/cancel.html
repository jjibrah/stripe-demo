<!-- public/cancel.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancelled</title>

<style>
  body {
    margin: 0;
    background: #f5f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  .icon {
    font-size: 50px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 10px;
  }

  a {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: white;
    background: #ff3b30;
    padding: 10px 18px;
    border-radius: 12px;
  }
</style>
</head>

<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>Payment Cancelled</h1>
    <p>Your payment was not completed.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
